DATA_COMP: |
  This indicator is computed by dividing the Gross Value Added (GVA) by the volume of water used.
  
  The GVA is in Chain-linked-volumes and is sourced from the NSO's online database.

  GVA figures by sector aggregate the following NACE sections:
  + Agriculture: NACE A (excluding NACE 03 because water use by fishing and aquaculture is negligible as these activities are marine-based)
  + Industries: NACE B, C, D, and F
  + Services: NACE E, and G-U

  Water use data comprises actual and estimated values that are sourced from the NSO, the Energy and Water Agency (EWA), and the Water Services Corporation (WSC).

  Water use by sector figures comprise the following data sources:
  + Agriculture: irrigation by rainwater harvesting, groundwater and treated sewage effluent; rainwater harvesting and groundwater for livestock rearing
  + Industries: self-supply by industries through groundwater abstraction
  + Services: self-supply by services and households from rainwater harvesting, groundwater and reverse osmosis; public water supply from groundwater and reverse osmosis sources
  
