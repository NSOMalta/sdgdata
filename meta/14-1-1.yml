DATA_COMP: |
  **Marine waters affected by eutrophication**
  
  An area is classified as eutrophic if for more than 25% of the observation days of a given year the chlorophyll concentrations as a proxy for eutrophication are above the 90th percentile of the 1998–2017 reference base line.
  
  Eutrophication is the process by which an excess of nutrients – mainly phosphorus and nitrogen – leads to increased growth of plant material, particularly algal blooms, in an aquatic body - resulting in a decrease in water quality. This can, in turn, cause death by hypoxia of aquatic organisms.
  
  Anthropogenic activities, such as farming, agriculture, aquaculture, industry and sewage, are the main source of nutrient input in problem areas.
  
  The Copernicus Marine Service calculates this indicator from satellite imagery.
