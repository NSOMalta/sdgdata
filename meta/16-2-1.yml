DATA_COMP: |
  Since 2020, referrals data include all intake cases as well as cases that were still pending an outcome by the end of the reporting year.
  
  The increase observed in 2020 is also attributed to a change in data collection method and the type of data collected. The FSWS developed an online case management system and the Child Protection Services fully migrated into the online system in 2020.
  
  Furthermore, a mandatory reporting provision was introduced in 2021, which also caused an increase in numbers.
