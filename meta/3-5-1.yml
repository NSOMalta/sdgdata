DATA_COMP: |
    The national estimates for high-risk heroin use were derived using the capture–recapture method. This statistical method combines multiple data sources to estimate the size of hidden populations and is commonly applied in the field of problematic drug use estimation.
    
    For this exercise, the capture–recapture method relied on overlapping cases identified across independent data sources.

    The capture–recapture model was applied specifically to daily heroin and cocaine users to produce the indicator 'Coverage of treatment interventions for daily users suffering from substance use disorders'.
    
    The operational definition used for estimation focuses on frequency of use (daily use), rather than the broader ICD-11 definition of drug use disorders (DUD).

    The data on persons in treatment includes all individuals in treatment for daily heroin use and cocaine use.

    The deviation from the original UN methodology arises because the UN data series is based on broader data, whereas the national estimates are derived from a statistical estimation technique limited to a defined high-risk subgroup (daily heroin and cocaine users).
