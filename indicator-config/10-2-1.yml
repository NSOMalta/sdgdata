      Notes:
      1. This indicator refers to persons aged 18 years and over.
      2. This indicator is produced using data from the EU Statistics on Income and Living Conditions (EU-SILC).
      3. A break in time series exists for the year 2023. Data from this year onwards should not be compared to that for previous years.
