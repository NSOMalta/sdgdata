  - series: Proportion of elected seats held by women in deliberative bodies of local government
    value: |
      Note: This indicator is reported as at 1 January of each reference year. Therefore, data reported during a particular year is attributed to the figure for the subsequent calendar year.
      
      Source: Ministry for National Heritage, the Arts and Local Government (MHAL) - [Local Government Division]
  - series: Proportion of seats held by women in national parliaments
    value: |
      Notes:
      1. Data for the reference years 2010 to 2019 is effective as of 1 February of the given year.
      2. From 2020 onwards, data is valid as of 1 January of the given year, based on the number of seats filled in parliament at the time.
      
      Source: Inter-Parliamentary Union (IPU)
