footer_fields:
  - series: Number of cases referred to the Child Protection Services concerning service users aged <1 to 14 years
    value: |
      Notes:
      1. A case is recorded every time a service user contacts the Child Protection Services, and may remain active across several reporting years (carried over from one year to another).
      2. Persons and types of abuse may be counted more than once, since service users may be referred to the service more than once during the same reporting year.
      3. Since 2020, referrals data include all intake cases as well as cases that were still pending an outcome by the end of the reporting year.
      4. More information on this dataset is found in the Proxy Metadata tab below.
      
      Source: The Foundation for Social Welfare Services (FSWS)
  - series: Rate of referrals to the Child Protection Services concerning service users aged <1 to 14 years, per 1,000 population aged 0-14
    value: |
      Notes:
      1. A case is recorded every time a service user contacts the Child Protection Services, and may remain active across several reporting years (carried over from one year to another).
      2. Persons and types of abuse may be counted more than once, since service users may be referred to the service more than once during the same reporting year.
      3. Since 2020, referrals data include all intake cases as well as cases that were still pending an outcome by the end of the reporting year.
      4. The rate of referrals is based on the mid-year population of children aged 0-14.
      5. More information on this dataset is found in the Proxy Metadata tab below.
      
      Sources: 
      + The Foundation for Social Welfare Services (FSWS)
      + National Statistics Office (NSO) Malta
