footer_fields:
  - series: Mainstreaming of global citizenship education and education for sustainable development in education system
    value: |
      Notes:
      1. This indicator is computed using data from the Country reports on the implementation of the UNESCO 1974 Recommendation concerning Education for International Understanding, Co-operation and Peace and Education relating to Human Rights and Fundamental Freedoms.
      2. Malta's report is produced and submitted by the Ministry for Education, Sport, Youth, Research and Innovation (MEYR).

      Source: United Nations Educational, Scientific and Cultural Organization (UNESCO)
  - series: Score on greening education
    value: |
      Notes:
      1. This indicator measures the extent to which green content is integrated in the official intended curriculum of primary and secondary education.
      2. This indicator is computed through an analysis of the national curriculum frameworks and the subject curricula documents from science and social science subjects taught in grades 3, 6, and 9.
      
      Source: United Nations Educational, Scientific and Cultural Organization (UNESCO)
