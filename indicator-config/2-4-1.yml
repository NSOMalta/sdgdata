  - series: 1. Progress toward productive and sustainable agriculture, trend score
    value: |
      Notes:
      1. This is an official UN proxy indicator produced by FAO to report on SDG indicator 2.4.1, which shows trend scores from 1 to 5, where 5 is the best possible score.
      2. The trend scores for Malta, which mainly fall within the 3.5 - 4.5 bracket, represent a 'Slight improvement towards productive and sustainable agriculture'.
      3. Further information on this can be found in the Proxy Metadata tab below.
      
      Source: Food and Agriculture Organization of the United Nations (FAO)
  - series: 2. Progress toward productive and sustainable agriculture, current status score
    value: |
