footer_fields:
  - series: Individuals' level of information and data literacy skills
    value: |
      Notes:
      1. This indicator refers to individuals aged 16-74.
      2. Individuals with low overall digital skills are defined as those having four out of five component indicators at a basic or above-basic level, and 'no skills' in one key area. For more information on the definitions of the skill levels please refer to the link provided in the Proxy Metadata tab below.
      3. Digital skills of individuals who have not used the internet in the last 3 months could not be assessed.
      4. This dataset includes figures for the reference year 2021 onwards, which were produced using a different methodology than the one used for previous years, and are being presented separately.
      5. This indicator is produced using data from the ICT Households Survey.
      
      Source: National Statistics Office (NSO) Malta
  - series: Individuals' level of digital skills
    value: |
      Notes:
      1. This indicator refers to individuals aged 16-74.
      2. Digital skills of individuals who have not used the internet in the last 3 months could not be assessed.
      3. For information on the definitions of the skill levels please refer to the link provided in the Proxy Metadata tab below.
      4. This dataset includes figures for the years 2015 to 2019 (data for the reference year 2018 is not available). Data produced for the year 2021 onwards adopted a different methodology and is being presented separately.
      5. This indicator is produced using data from the ICT Households Survey.
  
      Source: National Statistics Office (NSO) Malta
