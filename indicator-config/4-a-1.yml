  Notes:
  1. Private institutions include Church and Independent Schools.
  2. Lower secondary level (ISCED 2) refers to Middle Schools (Year 7 and Year 8), while Upper secondary level (ISCED 3) refers to Secondary Schools (Years 9, 10 and 11).
