data_footnote: |
  Notes:
  1. This indicator shows the ratio of tourist consumption expenditure to Gross Domestic Product (GDP) in nominal values.
  2. This proxy indicator differs from Tourism Satellite Account (TSA) GDP because TSA measures only the domestic value added generated by tourism industries, excluding both the direct import content of tourist spending and the imported inputs used in producing tourism services.

  Source: National Statistics Office (NSO) Malta
