footer_fields:
  - series: Proportion of population covered by at least one social protection benefit
    value: |
      The population directly covered by at least one social protection benefit includes:
      + Number of persons currently contributing to the social security system, being those employed (full-time + part-time as a primary job)
      + Number of persons in receipt of a Contributory pension (Retirement, Invalidity, Widows) over the statutory retirement age
      + Number of persons in receipt of a Non-Contributory Benefit (coverage independent of contributions paid)  
   
      In addition, the population not directly covered are:
      + Children — Despite being excluded from the population covered, these are indirectly covered through Children’s Allowance, although it’s the parents/legal guardians obtaining the benefit.
      + Individuals below retirement age who are neither employed nor receiving a benefit — These are also excluded, however, they would still be covered through the Age Pension scheme upon reaching the age of 60.

      Therefore, for Malta, the whole population is being covered (directly or indirectly) through the social security system.

      Source: This data series is produced by the National Statistics Office using data from Jobsplus, the System for the Administration of Social Benefits (SABS) database, and Eurostat.
  - series: Proportion of population with severe disabilities receiving disability cash benefit
    value: |
      Note: Beneficiaries represent those in receipt of a disability benefit as classified in the European System of integrated Social Protection Statistics (ESSPROS), under schemes 1 (Social Security Contributory Benefits), 2 (Social Security Non-Contributory Benefits) and 6 (Service Pensions).
      
      Source: This data series is produced by the National Statistics Office using data from the System for the Administration of Social Benefits (SABS) database and the DSS Unique Beneficiaries Report (Q3/2025).
  - series: Proportion of unemployed persons receiving unemployment cash benefit
    value: |
      Notes:
      1. This indicator refers to those benefits requiring registration with Jobsplus (Part 1).
      2. This includes the Unemployment Benefit (UB), Special Unemployment Benefit (SUB), and Unemployment Assistance (UA).
      3. In 2020, this included also the Additional Unemployment Benefit temporarily in place as a COVID-19 measure.
      4. Unemployed persons have been limited to those registered with Jobsplus (Part 1).

      Source: This data series is produced by the National Statistics Office using data from the System for the Administration of Social Benefits (SABS) database and Jobsplus.
