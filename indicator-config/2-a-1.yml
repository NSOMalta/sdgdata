footer_fields:
  - series: 1. Agriculture orientation index for government expenditures
    value: |
      Notes:
      1. An AOI greater than 1 reflects a higher orientation towards the agriculture sector, which receives a higher share of government spending relative to its contribution to economic value added. An AOI smaller than 1 reflects a lower orientation to agriculture, while an AOI equal to 1 reflects neutrality in a government’s orientation to the agriculture sector.
      
      2. The reason for the spike in AOI in 2023 is the sharp drop in the Gross Value Added of Section A of the National Accounts, due to negative value added recorded in the aquaculture industry that year. For more information on this, refer to <a href="https://nso.gov.mt/fisheries/aquaculture-2024/">NSO's Aquaculture 2024 News Release</a>

      Source: National Statistics Office (NSO) Malta
  - series: 2. Agriculture value added share of GDP
    value: |
      Source: National Statistics Office (NSO) Malta
  - series: 3. Agriculture share of Government Expenditure
    value: |
      Source: National Statistics Office (NSO) Malta
  - series: 4. Total government budget allocated for R&D on Agriculture
    value: |
      Note: Figures reported under government budget allocation for R&D on Agriculture include NABS 8 - Agriculture, and NABS 124 - R&D financed from General University Fund (GUF) in Agricultural Sciences, where NABS is the nomenclature for the analysis and comparison of scientific programmes and budgets.
      
      Source: National Statistics Office (NSO) Malta
  - series: 5. Percentage share of government budget allocated for R&D on Agriculture
    value: |
      Note: Figures reported under government budget allocation for R&D on Agriculture include NABS 8 - Agriculture, and NABS 124 - R&D financed from General University Fund (GUF) in Agricultural Sciences, where NABS is the nomenclature for the analysis and comparison of scientific programmes and budgets.
      
      Source: National Statistics Office (NSO) Malta
