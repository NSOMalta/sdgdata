footer_fields:
  - series: 1. Number of asylum first instance decisions per 100,000 population
    value: |
      Notes:
      1. Data related to first instance decisions taken in the reference year refer only to decisions taken by the International Protection Agency (IPA) granting protection and rejections (including inadmissible). The data excludes any other decisions that may have been taken by the IPA in the reference year, such as applications that were discontinued as explicitly/implicitly withdrawn, administrative closures and applications closed as Dublin cases.
      2. Data for 2022-2025 excludes decisions granting temporary protection.
      3. The IPA premises were closed between 13 March 2020 and 17 May 2020 due to the COVID-19 lockdown. However, the IPA was still receiving appointment requests to lodge applications.
           
      Sources: 
      + International Protection Agency (IPA)
      + National Statistics Office (NSO) Malta
  - series: 2. Percentage outcome of processed applications, by decision
    value: |
      Notes:
      1. This indicator refers to the asylum first instance decisions (positive and rejections) taken by the International Protection Agency (IPA) by year.
      2. Data related to first instance decisions taken in the reference year refer only to decisions taken by IPA granting protection and rejections (including inadmissible). The data excludes any other decisions that may have been taken by the IPA in the reference year, such as applications that were discontinued as explicitly/implicitly withdrawn, administrative closures and applications closed as Dublin cases.
      3. Data for 2022-2025 excludes decisions granting temporary protection.
      4. The IPA premises were closed between 13 March 2020 and 17 May 2020 due to the COVID-19 lockdown. However, the IPA was still receiving appointment requests to lodge applications.
      
      Source: International Protection Agency (IPA)
  - series: 3. Total asylum decisions pending as at end of year
    value: |
      Note: The International Protection Agency (IPA) premises were closed between 13 March 2020 and 17 May 2020 due to the COVID-19 lockdown. However, the IPA was still receiving appointment requests to lodge applications.
      
      Sources: 
      + International Protection Agency (IPA)
      + International Protection Appeals Tribunal (IPAT)
